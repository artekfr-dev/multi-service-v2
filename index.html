<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Multi-Service">
<title>Multi-Service Home</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:15px;background:#f2f2f7;color:#1c1c1e;min-height:100vh}
.app{display:flex;flex-direction:column;max-width:430px;margin:0 auto;min-height:100vh;background:#f2f2f7}
.header{background:#fff;padding:14px 16px 10px;border-bottom:0.5px solid #c6c6c8;position:sticky;top:0;z-index:40}
.header h1{font-size:17px;font-weight:600}
.content{flex:1;overflow-y:auto;padding:0 0 90px}
.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-top:0.5px solid #c6c6c8;display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom,8px)}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 4px;cursor:pointer;color:#8e8e93;font-size:10px;gap:3px}
.bnav-item.active{color:#007AFF}
.bnav-item i{font-size:22px}
.section{margin:16px 12px 0;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.section-header{padding:14px 16px 6px;font-size:13px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.5px}
.cell{display:flex;align-items:center;padding:13px 16px;border-bottom:0.5px solid #f2f2f7;gap:12px;cursor:pointer;background:#fff}
.cell:last-child{border-bottom:none}
.cell:active{background:#f2f2f7}
.cell-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.cell-content{flex:1;min-width:0}
.cell-title{font-size:15px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cell-sub{font-size:13px;color:#8e8e93;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cell-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.cell-chevron{color:#c7c7cc;font-size:14px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 12px 0}
.stat-card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.stat-label{font-size:12px;color:#8e8e93;margin-bottom:4px}
.stat-value{font-size:26px;font-weight:700}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:12px;font-weight:600}
.bgo{background:#dbeafe;color:#1e40af}.bwt{background:#fef3c7;color:#92400e}.bdn{background:#ede9fe;color:#4c1d95}.bpy{background:#d1fae5;color:#065f46}.bgr{background:#f3f4f6;color:#6b7280}
.empty-state{text-align:center;padding:60px 20px;color:#8e8e93}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:17px;font-weight:500;color:#1c1c1e;margin-bottom:6px}
.fab{position:fixed;bottom:80px;right:20px;width:52px;height:52px;border-radius:50%;background:#007AFF;color:#fff;border:none;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,122,255,.4);cursor:pointer;z-index:45}
.sheet-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:100;display:flex;flex-direction:column;justify-content:flex-end}
.sheet{background:#f2f2f7;border-radius:16px 16px 0 0;max-height:92vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,16px)}
.sheet-handle{width:36px;height:4px;background:#c7c7cc;border-radius:2px;margin:10px auto 6px}
.sheet-header{padding:4px 16px 12px;display:flex;align-items:center;justify-content:space-between;background:#f2f2f7;position:sticky;top:0;z-index:10}
.sheet-title{font-size:17px;font-weight:600}
.sheet-body{padding:0 12px 16px;display:flex;flex-direction:column;gap:10px}
.form-section{background:#fff;border-radius:12px;overflow:hidden}
.form-cell{padding:0 16px;border-bottom:0.5px solid #f2f2f7}
.form-cell:last-child{border-bottom:none}
.form-label{font-size:12px;color:#8e8e93;font-weight:500;padding-top:10px;text-transform:uppercase;letter-spacing:.4px}
.form-input{width:100%;border:none;background:transparent;font-size:15px;font-family:inherit;color:#1c1c1e;padding:8px 0 10px;outline:none}
.form-select{width:100%;border:none;background:transparent;font-size:15px;font-family:inherit;color:#1c1c1e;padding:8px 0 10px;outline:none;-webkit-appearance:none}
.form-textarea{width:100%;border:none;background:transparent;font-size:15px;font-family:inherit;color:#1c1c1e;padding:8px 0 10px;outline:none;resize:none;min-height:80px}
.ios-btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:17px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:2px}
.ios-btn-primary{background:#007AFF;color:#fff}
.ios-btn-success{background:#34c759;color:#fff}
.ios-btn-secondary{background:#fff;color:#007AFF}
.ios-btn-danger{background:#fff;color:#ff3b30}
.ios-btn-orange{background:#ff9500;color:#fff}
.totaux{background:#fff;border-radius:12px;padding:14px 16px}
.tot-row{display:flex;justify-content:space-between;padding:5px 0;font-size:15px}
.tot-grand{font-weight:700;font-size:17px;color:#007AFF;border-top:0.5px solid #e5e5ea;padding-top:10px;margin-top:6px}
.pzone{display:flex;flex-direction:column;gap:6px;padding:10px 0}
.photo-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid #007AFF;border-radius:10px;background:#fff;color:#007AFF;font-size:14px;cursor:pointer;font-family:inherit}
.pprev{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.pthumb{position:relative;width:72px;height:72px;border-radius:10px;overflow:hidden;border:1px solid #e5e5ea;flex-shrink:0}
.pthumb img{width:100%;height:100%;object-fit:cover;display:block}
.pdel{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;border:none;display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer}
.action-sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:200;padding:0 12px calc(env(safe-area-inset-bottom,0px) + 12px)}
.action-group{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:8px}
.action-item{display:flex;align-items:center;justify-content:center;padding:14px;font-size:17px;cursor:pointer;border-bottom:0.5px solid #e5e5ea;color:#007AFF}
.action-item:last-child{border-bottom:none}
.action-cancel{background:#fff;border-radius:14px;display:flex;align-items:center;justify-content:center;padding:14px;font-size:17px;font-weight:600;cursor:pointer;color:#007AFF}
.action-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:190}
.status-bar{display:flex;gap:8px;flex-wrap:wrap;padding:12px 16px;background:#fff;border-radius:12px}
.status-btn{flex:1;min-width:80px;padding:8px 4px;border-radius:8px;border:1.5px solid #e5e5ea;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;background:#fff;color:#8e8e93;text-align:center}
.status-btn.active-wt{background:#fef3c7;border-color:#92400e;color:#92400e}
.status-btn.active-go{background:#dbeafe;border-color:#1e40af;color:#1e40af}
.status-btn.active-dn{background:#ede9fe;border-color:#4c1d95;color:#4c1d95}
.status-btn.active-py{background:#d1fae5;border-color:#065f46;color:#065f46}
.suivi-item{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.suivi-date{font-size:12px;color:#8e8e93;margin-bottom:4px}
.suivi-note{font-size:15px}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <h1 id="page-title">Accueil</h1>
      <div id="header-action"></div>
    </div>
  </div>
  <div class="content" id="content"></div>
  <div id="fab-container"></div>
  <div class="bottomnav">
    <div class="bnav-item active" onclick="go('dash')" id="bn-dash"><i class="ti ti-layout-dashboard"></i><span>Accueil</span></div>
    <div class="bnav-item" onclick="go('clients')" id="bn-clients"><i class="ti ti-users"></i><span>Clients</span></div>
    <div class="bnav-item" onclick="go('missions')" id="bn-missions"><i class="ti ti-clipboard-list"></i><span>Missions</span></div>
    <div class="bnav-item" onclick="go('recap')" id="bn-recap"><i class="ti ti-report-money"></i><span>Récap</span></div>
  </div>
</div>
<script>
const SK='msa_v2';
function load(){try{const r=localStorage.getItem(SK);if(r)return JSON.parse(r);}catch(e){}return{clients:[],missions:[],suivis:[],cid:1,mid:1,sid:1};}
function save(){try{localStorage.setItem(SK,JSON.stringify(D));}catch(e){}}
let D=load();
let linePhotos={};
let lignesTemp=[];
let ligneIdx=0;

function cdn(c){if(!c)return'—';if(c.type==='Professionnel')return c.raison||'—';return[c.civ,c.prenom,c.nom].filter(Boolean).join(' ')||'—';}
function ini(c){if(!c)return'?';return cdn(c).split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();}
function fm(v){return v?parseFloat(v).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €':'—';}
function fmn(v){return parseFloat(v||0).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fd(v){if(!v)return'—';const[y,m,d]=v.split('-');return`${d}/${m}/${y}`;}
function eB(e){const m={'En attente':'bwt','En cours':'bgo','Terminée':'bdn','Payée':'bpy'};return`<span class="badge ${m[e]||'bgr'}">${e||'—'}</span>`;}
function calcTotal(m){return(m.lignes||[]).reduce((s,l)=>s+(parseFloat(l.qte)||0)*(parseFloat(l.prix)||0),0);}
function calcTP(m){return(m.lignes||[]).filter(l=>l.type==='Prestation').reduce((s,l)=>s+(parseFloat(l.qte)||0)*(parseFloat(l.prix)||0),0);}
function calcTV(m){return(m.lignes||[]).filter(l=>l.type==='Vente').reduce((s,l)=>s+(parseFloat(l.qte)||0)*(parseFloat(l.prix)||0),0);}

function go(t){
  ['dash','clients','missions','recap'].forEach(x=>{document.getElementById('bn-'+x).classList.toggle('active',x===t);});
  document.getElementById('page-title').textContent={dash:'Accueil',clients:'Clients',missions:'Missions',recap:'Récap mensuel'}[t];
  const fab=document.getElementById('fab-container');fab.innerHTML='';
  if(t==='clients')fab.innerHTML=`<button class="fab" onclick="openClient()">+</button>`;
  if(t==='missions')fab.innerHTML=`<button class="fab" onclick="openMission()">+</button>`;
  const el=document.getElementById('content');
  if(t==='dash')el.innerHTML=rDash();
  else if(t==='clients')el.innerHTML=rClients();
  else if(t==='missions')el.innerHTML=rMissions();
  else el.innerHTML=rRecap();
}

function rDash(){
  const ca=D.missions.reduce((s,m)=>s+calcTotal(m),0);
  const enc=D.missions.filter(m=>m.etat==='En cours').length;
  const last=[...D.missions].reverse().slice(0,5);
  return`<div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Clients</div><div class="stat-value" style="color:#534AB7">${D.clients.length}</div></div>
    <div class="stat-card"><div class="stat-label">Missions</div><div class="stat-value" style="color:#007AFF">${D.missions.length}</div></div>
    <div class="stat-card"><div class="stat-label">En cours</div><div class="stat-value" style="color:#ff9500">${enc}</div></div>
    <div class="stat-card"><div class="stat-label">CA total</div><div class="stat-value" style="color:#34c759;font-size:20px">${ca.toLocaleString('fr-FR',{maximumFractionDigits:0})} €</div></div>
  </div>
  <div class="section-header" style="margin:20px 12px 0">Dernières missions</div>
  ${last.length===0?`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Aucune mission</div><div class="empty-sub">Appuie sur + pour créer</div></div>`:`
  <div class="section">${last.map(m=>{const cl=D.clients.find(c=>c.id===m.cid);return`
    <div class="cell" onclick="openDetail(${m.id})">
      <div class="cell-icon" style="background:#ede9fe">📋</div>
      <div class="cell-content"><div class="cell-title">${m.chantier||'—'}</div><div class="cell-sub">${cdn(cl)} · ${fd(m.date)}</div></div>
      <div class="cell-right">${eB(m.etat)}<span class="cell-chevron">›</span></div>
    </div>`;}).join('')}</div>`}`;
}

function rClients(){
  if(!D.clients.length)return`<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-text">Aucun client</div><div class="empty-sub">Appuie sur + pour ajouter</div></div>`;
  return`<div class="section" style="margin:16px 12px 0">${D.clients.map(c=>{
    const nb=D.missions.filter(m=>m.cid===c.id).length;
    return`<div class="cell" onclick="openClient(${c.id})">
      <div class="cell-icon" style="background:#ede9fe;font-size:15px;font-weight:700;color:#534AB7">${ini(c)}</div>
      <div class="cell-content"><div class="cell-title">${cdn(c)}</div><div class="cell-sub">${c.type} · ${nb} mission${nb>1?'s':''}</div></div>
      <span class="cell-chevron">›</span>
    </div>`;}).join('')}</div>`;
}

function rMissions(){
  if(!D.missions.length)return`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Aucune mission</div><div class="empty-sub">Appuie sur + pour créer</div></div>`;
  return`<div class="section" style="margin:16px 12px 0">${[...D.missions].reverse().map(m=>{
    const cl=D.clients.find(c=>c.id===m.cid);
    const ns=D.suivis.filter(s=>s.mid===m.id).length;
    return`<div class="cell" onclick="openDetail(${m.id})">
      <div class="cell-icon" style="background:#e8f4fd">📋</div>
      <div class="cell-content"><div class="cell-title">${m.chantier||'—'}</div><div class="cell-sub">${cdn(cl)} · ${fm(calcTotal(m))}</div></div>
      <div class="cell-right">${eB(m.etat)}${ns>0?`<span style="background:#534AB7;color:#fff;font-size:11px;border-radius:10px;padding:1px 6px">${ns}</span>`:''}<span class="cell-chevron">›</span></div>
    </div>`;}).join('')}</div>`;
}

function rRecap(){
  const now=new Date();const months=[];
  for(let i=0;i<6;i++){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push({y:d.getFullYear(),m:d.getMonth()+1,label:d.toLocaleDateString('fr-FR',{month:'long',year:'numeric'})});}
  return`<div style="padding:16px 12px 0">
    <div class="form-section">
      <div class="form-cell"><div class="form-label">Mois</div><select class="form-select" id="sel-m" onchange="upRecap()">${months.map((mo,i)=>`<option value="${i}">${mo.label}</option>`).join('')}</select></div>
      <div class="form-cell"><div class="form-label">Client</div><select class="form-select" id="sel-c" onchange="upRecap()"><option value="">Tous</option>${D.clients.map(c=>`<option value="${c.id}">${cdn(c)}</option>`).join('')}</select></div>
    </div>
  </div>
  <div id="rc" style="padding:0 12px"></div>`;
}

function upRecap(){
  const now=new Date();const months=[];
  for(let i=0;i<6;i++){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push({y:d.getFullYear(),m:d.getMonth()+1});}
  const mi=parseInt(document.getElementById('sel-m').value)||0;
  const sc=document.getElementById('sel-c').value;
  document.getElementById('rc').innerHTML=bRecap(months[mi],sc?parseInt(sc):null);
}

function bRecap(selM,selC){
  let f=D.missions.filter(m=>{if(!m.date)return false;const[y,mo]=m.date.split('-').map(Number);return y===selM.y&&mo===selM.m&&(selC===null||m.cid===selC);});
  const tot=f.reduce((s,m)=>s+calcTotal(m),0);
  if(!f.length)return`<div class="empty-state"><div class="empty-icon">💶</div><div class="empty-text">Aucune mission ce mois-ci</div></div>`;
  const by={};f.forEach(m=>{if(!by[m.cid])by[m.cid]=[];by[m.cid].push(m);});
  let h='';
  Object.keys(by).forEach(cid=>{
    const cl=D.clients.find(c=>c.id===parseInt(cid));
    const ms=by[cid];const sT=ms.reduce((s,m)=>s+calcTotal(m),0);
    h+=`<div class="section-header" style="margin:16px 0 4px">${cdn(cl)} · ${sT.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})} €</div><div class="section">`;
    ms.forEach(m=>{h+=`<div class="cell"><div class="cell-content"><div class="cell-title">${m.chantier||'—'}</div>${m.adresse?`<div class="cell-sub">${m.adresse}</div>`:''}</div><div class="cell-right">${eB(m.etat)}<span style="font-weight:600">${fm(calcTotal(m))}</span></div></div>`;});
    h+=`</div>`;
  });
  h+=`<div class="totaux" style="margin-top:12px"><div class="tot-row tot-grand"><span>Total du mois</span><span>${tot.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})} €</span></div></div>`;
  return h;
}

function photoSection(pid,arr,label){
  return`<div class="pzone">
    <button type="button" class="photo-btn" onclick="showPhotoMenu('${pid}')">📷 ${label||'Ajouter une photo'}</button>
    <input type="file" id="inp-${pid}-cam" accept="image/*" capture="environment" style="display:none" onchange="onPhoto('${pid}',this)">
    <input type="file" id="inp-${pid}-gal" accept="image/*" multiple style="display:none" onchange="onPhoto('${pid}',this)">
    <input type="file" id="inp-${pid}-file" accept="image/*" multiple style="display:none" onchange="onPhoto('${pid}',this)">
    <div class="pprev" id="prev-${pid}">${thumbs(pid,arr)}</div>
  </div>`;
}
function showPhotoMenu(pid){
  const ol=document.createElement('div');ol.className='action-overlay';ol.id='ao-'+pid;ol.onclick=()=>{ol.remove();const b=document.getElementById('as-'+pid);if(b)b.remove();};
  document.body.appendChild(ol);
  const as=document.createElement('div');as.className='action-sheet';as.id='as-'+pid;
  as.innerHTML=`<div class="action-group">
    <div class="action-item" onclick="trigP('${pid}','cam');closeAS('${pid}')">📷 Appareil photo</div>
    <div class="action-item" onclick="trigP('${pid}','gal');closeAS('${pid}')">🖼️ Galerie photos</div>
    <div class="action-item" onclick="trigP('${pid}','file');closeAS('${pid}')">📁 Fichiers</div>
  </div>
  <div class="action-cancel" onclick="closeAS('${pid}')">Annuler</div>`;
  document.body.appendChild(as);
}
function closeAS(pid){const a=document.getElementById('ao-'+pid);const b=document.getElementById('as-'+pid);if(a)a.remove();if(b)b.remove();}
function trigP(pid,type){document.getElementById(`inp-${pid}-${type}`).click();}
function onPhoto(pid,inp){
  if(!linePhotos[pid])linePhotos[pid]=[];
  Array.from(inp.files).forEach(f=>{const r=new FileReader();r.onload=e=>{linePhotos[pid].push(e.target.result);upPrev(pid);};r.readAsDataURL(f);});
  inp.value='';
}
function thumbs(pid,arr){return(arr||[]).map((src,i)=>`<div class="pthumb"><img src="${src}" alt="photo"><button class="pdel" onclick="rmP('${pid}',${i})">✕</button></div>`).join('');}
function upPrev(pid){const el=document.getElementById(`prev-${pid}`);if(el)el.innerHTML=thumbs(pid,linePhotos[pid]||[]);}
function rmP(pid,i){if(linePhotos[pid])linePhotos[pid].splice(i,1);upPrev(pid);}

function openClient(id){
  const c=id?D.clients.find(x=>x.id===id):null;
  const dt=c?c.type:'Particulier';
  sheet(`${!c?'Nouveau':'Modifier'} client`,`
    <div class="form-section">
      <div class="form-cell"><div class="form-label">Type</div><select class="form-select" id="f-type" onchange="togCF()"><option value="Particulier" ${dt==='Particulier'?'selected':''}>Particulier</option><option value="Professionnel" ${dt==='Professionnel'?'selected':''}>Professionnel</option></select></div>
    </div>
    <div class="form-section" id="fp" style="${dt==='Professionnel'?'display:none':''}">
      <div class="form-cell"><div class="form-label">Civilité</div><select class="form-select" id="f-civ"><option ${!c||c.civ==='M.'?'selected':''}>M.</option><option ${c&&c.civ==='Mme'?'selected':''}>Mme</option></select></div>
      <div class="form-cell"><div class="form-label">Prénom</div><input class="form-input" id="f-prenom" value="${c?c.prenom||'':''}" placeholder="Jean"></div>
      <div class="form-cell"><div class="form-label">Nom *</div><input class="form-input" id="f-nom" value="${c?c.nom||'':''}" placeholder="Dupont"></div>
    </div>
    <div class="form-section" id="fpr" style="${dt==='Particulier'?'display:none':''}">
      <div class="form-cell"><div class="form-label">Raison sociale *</div><input class="form-input" id="f-raison" value="${c?c.raison||'':''}" placeholder="Conciergerie ABC"></div>
    </div>
    <div class="form-section">
      <div class="form-cell"><div class="form-label">Mobile</div><input class="form-input" id="f-mob" type="tel" value="${c?c.mobile||'':''}"></div>
      <div class="form-cell"><div class="form-label">Mail</div><input class="form-input" id="f-mail" type="email" value="${c?c.mail||'':''}"></div>
      <div class="form-cell"><div class="form-label">Adresse</div><input class="form-input" id="f-adr" value="${c?c.adr||'':''}"></div>
      <div class="form-cell"><div class="form-label">Code postal</div><input class="form-input" id="f-cp" type="number" value="${c?c.cp||'':''}"></div>
      <div class="form-cell"><div class="form-label">Ville</div><input class="form-input" id="f-ville" value="${c?c.ville||'':''}"></div>
    </div>
    ${id?`<button class="ios-btn ios-btn-danger" onclick="delClient(${id})">Supprimer ce client</button>`:''}
    <button class="ios-btn ios-btn-primary" onclick="saveClient(${id||'null'})">Enregistrer</button>
  `);
}
function togCF(){const t=document.getElementById('f-type').value;document.getElementById('fp').style.display=t==='Particulier'?'':'none';document.getElementById('fpr').style.display=t==='Professionnel'?'':'none';}
function saveClient(id){
  const type=document.getElementById('f-type').value;let nom='',prenom='',civ='',raison='';
  if(type==='Particulier'){nom=document.getElementById('f-nom').value.trim();prenom=document.getElementById('f-prenom').value.trim();civ=document.getElementById('f-civ').value;if(!nom){alert('Nom obligatoire');return;}}
  else{raison=document.getElementById('f-raison').value.trim();if(!raison){alert('Raison sociale obligatoire');return;}}
  const obj={id:id||D.cid++,type,nom,prenom,civ,raison,mobile:document.getElementById('f-mob').value.trim(),mail:document.getElementById('f-mail').value.trim(),adr:document.getElementById('f-adr').value.trim(),cp:document.getElementById('f-cp').value.trim(),ville:document.getElementById('f-ville').value.trim()};
  if(id){const i=D.clients.findIndex(c=>c.id===id);D.clients[i]=obj;}else D.clients.push(obj);
  save();closeSheet();go('clients');
}
function delClient(id){if(confirm('Supprimer ce client ?')){D.clients=D.clients.filter(c=>c.id!==id);save();closeSheet();go('clients');}}

function newLigne(){return{id:'l'+(ligneIdx++),type:'Prestation',designation:'',qte:1,prix:'',photosAvant:[],photosApres:[]};}
function renderLignes(){
  const c=document.getElementById('lignes-container');if(!c)return;
  c.innerHTML=lignesTemp.map((l,i)=>`
  <div class="form-section" style="margin-bottom:8px">
    <div class="form-cell" style="background:#f0eeff">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0 8px">
        <span style="font-size:13px;font-weight:600;color:#534AB7">Ligne ${i+1}</span>
        <button onclick="delLigne('${l.id}')" style="border:none;background:none;color:#ff3b30;font-size:22px;cursor:pointer">🗑</button>
      </div>
      <select class="form-select" style="padding-bottom:10px" onchange="updL('${l.id}','type',this.value)">
        <option value="Prestation" ${l.type==='Prestation'?'selected':''}>Prestation</option>
        <option value="Vente" ${l.type==='Vente'?'selected':''}>Vente</option>
      </select>
    </div>
    <div class="form-cell"><div class="form-label">Désignation</div><input class="form-input" value="${l.designation||''}" placeholder="Description des travaux" onchange="updL('${l.id}','designation',this.value)"></div>
    <div class="form-cell" style="display:grid;grid-template-columns:1fr 1fr">
      <div style="padding-right:8px;border-right:0.5px solid #f2f2f7"><div class="form-label">Quantité</div><input class="form-input" type="number" value="${l.qte||1}" min="1" onchange="updL('${l.id}','qte',this.value)" style="text-align:right"></div>
      <div style="padding-left:8px"><div class="form-label">Prix €</div><input class="form-input" type="number" value="${l.prix||''}" placeholder="0.00" step="0.01" onchange="updL('${l.id}','prix',this.value)" style="text-align:right"></div>
    </div>
    <div class="form-cell"><div class="form-label" style="color:#065f46;padding-bottom:8px">Total : ${fmn((parseFloat(l.qte)||0)*(parseFloat(l.prix)||0))} €</div></div>
    <div class="form-cell">${photoSection('av-'+l.id,linePhotos['av-'+l.id]||[],'Photo avant')}</div>
  </div>`).join('');
  updateTotals();
}
function updL(id,key,val){const l=lignesTemp.find(x=>x.id===id);if(!l)return;l[key]=val;updateTotals();}
function addLigne(){const l=newLigne();lignesTemp.push(l);linePhotos['av-'+l.id]=[];renderLignes();}
function delLigne(id){lignesTemp=lignesTemp.filter(l=>l.id!==id);delete linePhotos['av-'+id];renderLignes();}
function updateTotals(){
  let tp=0,tv=0;
  lignesTemp.forEach(l=>{const t=(parseFloat(l.qte)||0)*(parseFloat(l.prix)||0);if(l.type==='Prestation')tp+=t;else tv+=t;});
  const el=document.getElementById('totaux-display');
  if(el)el.innerHTML=`<div class="tot-row"><span>Total Prestation</span><span>${fmn(tp)} €</span></div><div class="tot-row"><span>Total Vente</span><span>${fmn(tv)} €</span></div><div class="tot-row tot-grand"><span>Total Général</span><span>${fmn(tp+tv)} €</span></div>`;
}

function openMission(id){
  const m=id?D.missions.find(x=>x.id===id):null;
  lignesTemp=m&&m.lignes?m.lignes.map(l=>({...l})):[newLigne()];
  linePhotos={};
  lignesTemp.forEach(l=>{linePhotos['av-'+l.id]=[...(l.photosAvant||[])];});
  sheet(`${m?'Modifier':'Nouvelle'} mission`,`
    <div class="form-section">
      <div class="form-cell"><div class="form-label">Client *</div><select class="form-select" id="f-cid"><option value="">— Choisir —</option>${D.clients.map(c=>`<option value="${c.id}" ${m&&m.cid===c.id?'selected':''}>${cdn(c)}</option>`).join('')}</select></div>
      <div class="form-cell"><div class="form-label">Nom du chantier *</div><input class="form-input" id="f-ch" value="${m?m.chantier||'':''}" placeholder="Ménage Appt 3B"></div>
      <div class="form-cell"><div class="form-label">Adresse</div><input class="form-input" id="f-adr" value="${m?m.adresse||'':''}" placeholder="12 rue Victor Hugo"></div>
      <div class="form-cell"><div class="form-label">Date</div><input class="form-input" type="date" id="f-date" value="${m?m.date||'':''}"></div>
      <div class="form-cell"><div class="form-label">État</div><select class="form-select" id="f-et">
        <option ${!m||m.etat==='En attente'?'selected':''}>En attente</option>
        <option ${m&&m.etat==='En cours'?'selected':''}>En cours</option>
        <option ${m&&m.etat==='Terminée'?'selected':''}>Terminée</option>
        <option ${m&&m.etat==='Payée'?'selected':''}>Payée</option>
      </select></div>
    </div>
    <div style="font-size:13px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.5px;padding:8px 4px 4px">Travaux</div>
    <div id="lignes-container"></div>
    <button type="button" class="ios-btn ios-btn-secondary" style="border:1px dashed #007AFF;margin-bottom:4px" onclick="addLigne()">+ Ajouter une ligne</button>
    <div class="totaux" id="totaux-display"></div>
    <div class="form-section">
      <div class="form-cell"><div class="form-label">Commentaires</div><textarea class="form-textarea" id="f-comment">${m?m.comment||'':''}</textarea></div>
    </div>
    ${id?`<button class="ios-btn ios-btn-danger" onclick="delMission(${id})">Supprimer cette mission</button>`:''}
    <button class="ios-btn ios-btn-primary" onclick="saveMission(${id||'null'})">Enregistrer</button>
  `);
  setTimeout(()=>{renderLignes();},50);
}
function saveMission(id){
  const cid=parseInt(document.getElementById('f-cid').value);
  const chantier=document.getElementById('f-ch').value.trim();
  if(!cid||!chantier){alert('Client et chantier obligatoires');return;}
  const lignes=lignesTemp.map(l=>({...l,photosAvant:[...(linePhotos['av-'+l.id]||[])]}));
  const m=id?D.missions.find(x=>x.id===id):null;
  const obj={id:id||D.mid++,cid,date:document.getElementById('f-date').value,chantier,adresse:document.getElementById('f-adr').value.trim(),etat:document.getElementById('f-et').value,lignes,comment:document.getElementById('f-comment').value.trim(),
    photosApres:m?m.photosApres||[]:[], compteRendu:m?m.compteRendu||'':''};
  if(id){const i=D.missions.findIndex(m=>m.id===id);D.missions[i]=obj;}else D.missions.push(obj);
  linePhotos={};lignesTemp=[];save();closeSheet();go('missions');
}
function delMission(id){if(confirm('Supprimer ?')){D.missions=D.missions.filter(m=>m.id!==id);D.suivis=D.suivis.filter(s=>s.mid!==id);save();closeSheet();go('missions');}}

function openDetail(id){
  const m=D.missions.find(x=>x.id===id);if(!m)return;
  const cl=D.clients.find(c=>c.id===m.cid);
  const lignes=m.lignes||[];
  const tp=calcTP(m),tv=calcTV(m),tot=calcTotal(m);
  const ns=D.suivis.filter(s=>s.mid===id);
  linePhotos['apres-'+id]=m.photosApres?[...m.photosApres]:[];

  sheet(`Mission #${m.id}`,`
    <div class="form-section">
      <div class="cell"><div class="cell-content"><div class="cell-sub">Client</div><div class="cell-title">${cdn(cl)}</div></div></div>
      <div class="cell"><div class="cell-content"><div class="cell-sub">Chantier</div><div class="cell-title">${m.chantier||'—'}</div></div></div>
      ${m.adresse?`<div class="cell"><div class="cell-content"><div class="cell-sub">Adresse</div><div class="cell-title">${m.adresse}</div></div></div>`:''}
      <div class="cell"><div class="cell-content"><div class="cell-sub">Date</div><div class="cell-title">${fd(m.date)}</div></div><div>${eB(m.etat)}</div></div>
    </div>

    <div class="section-header" style="margin:14px 0 6px">Changer le statut</div>
    <div class="status-bar" id="status-bar-${id}">
      <button class="status-btn ${m.etat==='En attente'?'active-wt':''}" onclick="setEtat(${id},'En attente')">En attente</button>
      <button class="status-btn ${m.etat==='En cours'?'active-go':''}" onclick="setEtat(${id},'En cours')">En cours</button>
      <button class="status-btn ${m.etat==='Terminée'?'active-dn':''}" onclick="setEtat(${id},'Terminée')">Terminée</button>
      <button class="status-btn ${m.etat==='Payée'?'active-py':''}" onclick="setEtat(${id},'Payée')">Payée</button>
    </div>

    ${lignes.length>0?`
    <div class="section-header" style="margin:14px 0 4px">Travaux · Total : ${fm(tot)}</div>
    ${lignes.map(l=>`<div class="form-section" style="margin-bottom:8px">
      <div class="cell"><span class="badge ${l.type==='Prestation'?'bgo':'bpy'}">${l.type}</span>
      <div class="cell-content" style="margin-left:10px"><div class="cell-title">${l.designation||'—'}</div>
      <div class="cell-sub">${l.qte} × ${l.prix?parseFloat(l.prix).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €':'—'} = <strong>${fmn((parseFloat(l.qte)||0)*(parseFloat(l.prix)||0))} €</strong></div></div></div>
      ${(l.photosAvant||[]).length>0?`<div class="cell" style="flex-direction:column;align-items:flex-start;gap:6px"><div class="form-label">Photos avant</div><div class="pprev">${l.photosAvant.map(src=>`<div class="pthumb"><img src="${src}" alt="av"></div>`).join('')}</div></div>`:''}
    </div>`).join('')}
    <div class="totaux"><div class="tot-row"><span>Total Prestation</span><span>${fmn(tp)} €</span></div><div class="tot-row"><span>Total Vente</span><span>${fmn(tv)} €</span></div><div class="tot-row tot-grand"><span>Total Général</span><span>${fmn(tot)} €</span></div></div>`:''}

    <div class="section-header" style="margin:14px 0 6px">📷 Photos après le chantier</div>
    <div class="form-section"><div class="form-cell">${photoSection('apres-'+id,m.photosApres||[],'Ajouter photos après')}</div></div>

    <div class="section-header" style="margin:14px 0 6px">📝 Compte rendu</div>
    <div class="form-section">
      <div class="form-cell"><div class="form-label">Date d'exécution</div><input class="form-input" type="date" id="cr-date-${id}" value="${m.dateExec||''}"></div>
      <div class="form-cell"><div class="form-label">Commentaire final</div><textarea class="form-textarea" id="cr-comment-${id}" placeholder="Décrivez le travail effectué...">${m.compteRendu||''}</textarea></div>
    </div>
    <button class="ios-btn ios-btn-success" onclick="saveCompteRendu(${id})">✅ Enregistrer le compte rendu</button>

    <div class="section-header" style="margin:14px 0 6px">Suivi (${ns.length})</div>
    ${ns.length>0?`<div style="display:flex;flex-direction:column;gap:8px">${ns.map(s=>`<div class="suivi-item"><div class="suivi-date">${fd(s.date)}</div><div class="suivi-note">${s.note}</div><button onclick="delSuivi(${s.id},${id})" style="border:none;background:none;color:#ff3b30;font-size:13px;cursor:pointer;margin-top:4px">Supprimer</button></div>`).join('')}</div>`:''}
    <div class="form-section" style="margin-top:8px">
      <div class="form-cell"><div class="form-label">Date</div><input class="form-input" type="date" id="s-date-${id}"></div>
      <div class="form-cell"><div class="form-label">Note de suivi</div><textarea class="form-textarea" id="s-note-${id}" placeholder="Retour sur site, remarque..."></textarea></div>
    </div>
    <button class="ios-btn ios-btn-orange" onclick="saveSuivi(${id})">+ Ajouter un suivi</button>
    <button class="ios-btn ios-btn-primary" onclick="closeSheet();openMission(${id})">✏️ Modifier la mission</button>
  `);
}

function setEtat(id,etat){
  const m=D.missions.find(x=>x.id===id);if(!m)return;
  m.etat=etat;save();
  const bar=document.getElementById('status-bar-'+id);
  if(bar){
    bar.querySelectorAll('.status-btn').forEach(btn=>{
      btn.className='status-btn';
      if(btn.textContent==='En attente'&&etat==='En attente')btn.classList.add('active-wt');
      if(btn.textContent==='En cours'&&etat==='En cours')btn.classList.add('active-go');
      if(btn.textContent==='Terminée'&&etat==='Terminée')btn.classList.add('active-dn');
      if(btn.textContent==='Payée'&&etat==='Payée')btn.classList.add('active-py');
    });
  }
}

function saveCompteRendu(id){
  const m=D.missions.find(x=>x.id===id);if(!m)return;
  m.dateExec=document.getElementById('cr-date-'+id).value;
  m.compteRendu=document.getElementById('cr-comment-'+id).value.trim();
  m.photosApres=[...(linePhotos['apres-'+id]||[])];
  if(!m.etat||m.etat==='En cours')m.etat='Terminée';
  save();
  alert('✅ Compte rendu enregistré !');
  closeSheet();
  go('missions');
}

function saveSuivi(mid){
  const note=document.getElementById('s-note-'+mid).value.trim();
  if(!note){alert('Note obligatoire');return;}
  D.suivis.push({id:D.sid++,mid,date:document.getElementById('s-date-'+mid).value,note});
  save();closeSheet();openDetail(mid);
}
function delSuivi(id,mid){D.suivis=D.suivis.filter(s=>s.id!==id);save();closeSheet();openDetail(mid);}

function sheet(title,body){
  const ov=document.createElement('div');ov.className='sheet-overlay';ov.id='sheet-overlay';
  ov.onclick=e=>{if(e.target===ov)closeSheet();};
  ov.innerHTML=`<div class="sheet"><div class="sheet-handle"></div>
    <div class="sheet-header"><div class="sheet-title">${title}</div><button onclick="closeSheet()" style="border:none;background:none;color:#007AFF;font-size:16px;cursor:pointer;font-family:inherit">Fermer</button></div>
    <div class="sheet-body">${body}</div></div>`;
  document.body.appendChild(ov);
}
function closeSheet(){const s=document.getElementById('sheet-overlay');if(s)s.remove();}

go('dash');
</script>
</body>
</html>
