<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Multi Services Home">
<title>Multi Services Home</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:15px;background:#f2f2f7;color:#1c1c1e;min-height:100vh}
.app{display:flex;flex-direction:column;max-width:430px;margin:0 auto;min-height:100vh;background:#f2f2f7}
.header{background:#fff;padding:14px 16px 10px;border-bottom:0.5px solid #c6c6c8;position:sticky;top:0;z-index:40}
.header h1{font-size:17px;font-weight:600}
.content{flex:1;overflow-y:auto;padding:0 0 90px}
.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-top:0.5px solid #c6c6c8;display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom,8px)}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 4px;cursor:pointer;color:#8e8e93;font-size:10px;gap:3px}
.bnav-item.active{color:#007AFF}
.bnav-item i{font-size:22px}
.section{margin:16px 12px 0;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.section-header{padding:14px 16px 6px;font-size:13px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.5px}
.cell{display:flex;align-items:center;padding:13px 16px;border-bottom:0.5px solid #f2f2f7;gap:12px;cursor:pointer;background:#fff}
.cell:last-child{border-bottom:none}
.cell:active{background:#f2f2f7}
.cell-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.cell-content{flex:1;min-width:0}
.cell-title{font-size:15px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cell-sub{font-size:13px;color:#8e8e93;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cell-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.cell-chevron{color:#c7c7cc;font-size:14px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 12px 0}
.stat-card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.stat-label{font-size:12px;color:#8e8e93;margin-bottom:4px}
.stat-value{font-size:26px;font-weight:700}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:12px;font-weight:600}
.bgo{background:#dbeafe;color:#1e40af}.bwt{background:#fef3c7;color:#92400e}.bdn{background:#ede9fe;color:#4c1d95}.bpy{background:#d1fae5;color:#065f46}.bgr{background:#f3f4f6;color:#6b7280}
.empty-state{text-align:center;padding:60px 20px;color:#8e8e93}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:17px;font-weight:500;color:#1c1c1e;margin-bottom:6px}
.fab{position:fixed;bottom:80px;right:20px;width:52px;height:52px;border-radius:50%;background:#007AFF;color:#fff;border:none;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,122,255,.4);cursor:pointer;z-index:45}
.sheet-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:100;display:flex;flex-direction:column;justify-content:flex-end}
.sheet{background:#f2f2f7;border-radius:16px 16px 0 0;max-height:92vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,16px)}
.sheet-handle{width:36px;height:4px;background:#c7c7cc;border-radius:2px;margin:10px auto 6px}
.sheet-header{padding:4px 16px 12px;display:flex;align-items:center;justify-content:space-between;background:#f2f2f7;position:sticky;top:0;z-index:10}
.sheet-title{font-size:17px;font-weight:600}
.sheet-body{padding:0 12px 16px;display:flex;flex-direction:column;gap:10px}
.form-section{background:#fff;border-radius:12px;overflow:hidden}
.form-cell{padding:0 14px;border-bottom:0.5px solid #f2f2f7}
.form-cell:last-child{border-bottom:none}
.form-label{font-size:11px;color:#8e8e93;font-weight:600;padding-top:8px;text-transform:uppercase;letter-spacing:.4px}
.form-input{width:100%;border:none;background:transparent;font-size:15px;font-family:inherit;color:#1c1c1e;padding:6px 0 8px;outline:none}
.form-select{width:100%;border:none;background:transparent;font-size:15px;font-family:inherit;color:#1c1c1e;padding:8px 0 10px;outline:none;-webkit-appearance:none}
.form-textarea{width:100%;border:none;background:transparent;font-size:15px;font-family:inherit;color:#1c1c1e;padding:8px 0 10px;outline:none;resize:none;min-height:80px}
.ios-btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:17px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:2px}
.ios-btn-primary{background:#007AFF;color:#fff}
.ios-btn-success{background:#34c759;color:#fff}
.ios-btn-secondary{background:#fff;color:#007AFF}
.ios-btn-danger{background:#fff;color:#ff3b30}
.ios-btn-orange{background:#ff9500;color:#fff}
.ios-btn-purple{background:#534AB7;color:#fff}
.totaux{background:#fff;border-radius:10px;padding:10px 14px}
.tot-row{display:flex;justify-content:space-between;padding:3px 0;font-size:14px}
.tot-grand{font-weight:700;font-size:17px;color:#007AFF;border-top:0.5px solid #e5e5ea;padding-top:10px;margin-top:6px}

/* Zone photo améliorée */
.pzone{display:flex;flex-direction:column;gap:8px;padding:10px 0}
.photo-main-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border:1.5px dashed #007AFF;border-radius:12px;background:#f0f7ff;color:#007AFF;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;width:100%}
.pprev{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.pthumb{position:relative;width:80px;height:80px;border-radius:10px;overflow:hidden;border:1px solid #e5e5ea;flex-shrink:0}
.pthumb img{width:100%;height:100%;object-fit:cover;display:block}
.pdel{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer}

.action-sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:200;padding:0 12px calc(env(safe-area-inset-bottom,0px) + 12px)}
.action-group{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:8px}
.action-item{display:flex;align-items:center;justify-content:center;gap:10px;padding:16px;font-size:17px;cursor:pointer;border-bottom:0.5px solid #e5e5ea;color:#007AFF}
.action-item:last-child{border-bottom:none}
.action-item:active{background:#f2f2f7}
.action-cancel{background:#fff;border-radius:14px;display:flex;align-items:center;justify-content:center;padding:16px;font-size:17px;font-weight:600;cursor:pointer;color:#ff3b30}
.action-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:190}

.status-bar{display:flex;gap:8px;flex-wrap:wrap;padding:12px 16px;background:#fff;border-radius:12px}
.status-btn{flex:1;min-width:80px;padding:8px 4px;border-radius:8px;border:1.5px solid #e5e5ea;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;background:#fff;color:#8e8e93;text-align:center}
.status-btn.active-wt{background:#fef3c7;border-color:#92400e;color:#92400e}
.status-btn.active-go{background:#dbeafe;border-color:#1e40af;color:#1e40af}
.status-btn.active-dn{background:#ede9fe;border-color:#4c1d95;color:#4c1d95}
.status-btn.active-py{background:#d1fae5;border-color:#065f46;color:#065f46}
.suivi-item{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.suivi-date{font-size:12px;color:#8e8e93;margin-bottom:4px}
.suivi-note{font-size:15px}

/* Checkbox missions pour PDF */
.mission-check{display:flex;align-items:center;padding:12px 16px;border-bottom:0.5px solid #f2f2f7;gap:12px;background:#fff}
.mission-check:last-child{border-bottom:none}
.mission-check input[type=checkbox]{width:22px;height:22px;accent-color:#007AFF;flex-shrink:0}

/* PDF template caché */
#pdf-template{display:none;position:fixed;top:-9999px;left:-9999px;width:800px;background:#fff;padding:40px;font-family:Arial,sans-serif}
.pdf-header{display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #1a3a6b;padding-bottom:20px;margin-bottom:24px}
.pdf-logo-zone{display:flex;align-items:center;gap:16px}
.pdf-logo{width:80px;height:80px;object-fit:contain}
.pdf-company{color:#1a3a6b}
.pdf-company h1{font-size:22px;font-weight:700;margin-bottom:4px}
.pdf-company p{font-size:13px;color:#555;margin:2px 0}
.pdf-client-box{background:#f5f7ff;border-left:4px solid #1a3a6b;padding:14px 18px;margin-bottom:20px;border-radius:0 8px 8px 0}
.pdf-client-box h3{font-size:13px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.pdf-client-box p{font-size:16px;font-weight:600;color:#1a3a6b}
.pdf-mission{border:1px solid #e5e5e5;border-radius:8px;margin-bottom:16px;overflow:hidden}
.pdf-mission-header{background:#1a3a6b;color:#fff;padding:10px 16px;font-size:14px;font-weight:600}
.pdf-mission-info{padding:12px 16px;border-bottom:1px solid #f0f0f0;display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px}
.pdf-info-label{color:#888;font-size:11px;text-transform:uppercase}
.pdf-info-value{font-weight:500;color:#1c1c1e}
.pdf-ligne-table{width:100%;border-collapse:collapse;font-size:13px}
.pdf-ligne-table th{background:#f5f7ff;color:#1a3a6b;padding:8px 12px;text-align:left;font-size:12px;font-weight:600}
.pdf-ligne-table td{padding:8px 12px;border-bottom:1px solid #f0f0f0}
.pdf-ligne-table tr:last-child td{border-bottom:none}
.pdf-totaux{padding:12px 16px;background:#f9f9f9;text-align:right}
.pdf-total-line{font-size:13px;color:#555;margin-bottom:4px}
.pdf-total-grand{font-size:16px;font-weight:700;color:#1a3a6b;margin-top:6px;border-top:1px solid #ddd;padding-top:8px}
.pdf-photos{padding:12px 16px}
.pdf-photos h4{font-size:12px;color:#888;text-transform:uppercase;margin-bottom:8px}
.pdf-photos-grid{display:flex;flex-wrap:wrap;gap:8px}
.pdf-photos-grid img{width:160px;height:120px;object-fit:cover;border-radius:6px;border:1px solid #e5e5e5}
.pdf-footer{margin-top:30px;border-top:1px solid #e5e5e5;padding-top:16px;text-align:center;font-size:12px;color:#888}
.pdf-grand-total{background:#1a3a6b;color:#fff;padding:16px 20px;border-radius:8px;margin-top:16px;display:flex;justify-content:space-between;align-items:center}
.pdf-grand-total span{font-size:18px;font-weight:700}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <h1 id="page-title">Accueil</h1>
      <div id="header-action"></div>
    </div>
  </div>
  <div class="content" id="content"></div>
  <div id="fab-container"></div>
  <div class="bottomnav">
    <div class="bnav-item active" onclick="go('dash')" id="bn-dash"><i class="ti ti-layout-dashboard"></i><span>Accueil</span></div>
    <div class="bnav-item" onclick="go('clients')" id="bn-clients"><i class="ti ti-users"></i><span>Clients</span></div>
    <div class="bnav-item" onclick="go('missions')" id="bn-missions"><i class="ti ti-clipboard-list"></i><span>Missions</span></div>
    <div class="bnav-item" onclick="go('recap')" id="bn-recap"><i class="ti ti-report-money"></i><span>Récap</span></div>
  </div>
</div>
<div id="pdf-template"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const SK='msa_v2';
const MSH={name:'Multi Services Home',contact:'Arthur TEKEHYAN',activite:'Tous Services',tel:'06 52 71 91 32',mail:'msh.antibes@gmail.com',adresse:'4, Avenue Gambetta',cp:'06600',ville:'ANTIBES'};
let _db=null;
try{
  firebase.initializeApp({
    apiKey:"AIzaSyBz9IuIlhKLR55Uv7Ec5c6hHuHJjNWtE50",
    authDomain:"multi-services-home.firebaseapp.com",
    projectId:"multi-services-home",
    storageBucket:"multi-services-home.firebasestorage.app",
    messagingSenderId:"77041427640",
    appId:"1:77041427640:web:2fa18e370c021d59b1804d"
  });
  _db=firebase.firestore();
  console.log('Firebase OK, db:', _db?'oui':'non');
}catch(e){console.warn('FB init error:',e);}

let D={clients:[],missions:[],suivis:[],cid:1,mid:1,sid:1};

function save(){
  try{localStorage.setItem(SK,JSON.stringify(D));}catch(e){}
  if(_db){
    _db.collection('app').doc('data').set(JSON.parse(JSON.stringify(D)))
      .then(function(){console.log('Firebase sauvegardé !');})
      .catch(function(e){console.warn('Firebase save error:',e);});
  } else { console.warn('_db est null, pas de sauvegarde Firebase'); }
}

async function initData(){
  if(_db){
    try{
      var snap=await _db.collection('app').doc('data').get();
      if(snap.exists){D=snap.data();localStorage.setItem(SK,JSON.stringify(D));console.log('Données Firebase chargées');return;}
    }catch(e){console.warn('FB load error:',e);}
  }
  try{var r=localStorage.getItem(SK);if(r){D=JSON.parse(r);console.log('Données localStorage chargées');}}catch(e){}
}
let linePhotos={};
let lignesTemp=[];
let ligneIdx=0;
let missionPhotosAvant={};
let missionPhotosApres={};

function cdn(c){if(!c)return'—';if(c.type==='Professionnel')return c.raison||'—';return[c.civ,c.prenom,c.nom].filter(Boolean).join(' ')||'—';}
function ini(c){if(!c)return'?';return cdn(c).split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();}
function fm(v){return v?parseFloat(v).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €':'—';}
function fmn(v){return parseFloat(v||0).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fd(v){if(!v)return'—';const[y,m,d]=v.split('-');return`${d}/${m}/${y}`;}
function eB(e){const m={'En attente':'bwt','En cours':'bgo','Terminée':'bdn','Payée':'bpy'};return`<span class="badge ${m[e]||'bgr'}">${e||'—'}</span>`;}
function calcTotal(m){return(m.lignes||[]).reduce((s,l)=>s+(parseFloat(l.qte)||0)*(parseFloat(l.prix)||0),0);}
function calcTP(m){return(m.lignes||[]).filter(l=>l.type==='Prestation').reduce((s,l)=>s+(parseFloat(l.qte)||0)*(parseFloat(l.prix)||0),0);}
function calcTV(m){return(m.lignes||[]).filter(l=>l.type==='Vente').reduce((s,l)=>s+(parseFloat(l.qte)||0)*(parseFloat(l.prix)||0),0);}

function go(t){
  ['dash','clients','missions','recap'].forEach(x=>{document.getElementById('bn-'+x).classList.toggle('active',x===t);});
  document.getElementById('page-title').textContent={dash:'Accueil',clients:'Clients',missions:'Missions',recap:'Récap mensuel'}[t];
  const fab=document.getElementById('fab-container');fab.innerHTML='';
  if(t==='clients')fab.innerHTML=`<button class="fab" onclick="openClient()">+</button>`;
  if(t==='missions')fab.innerHTML=`<button class="fab" onclick="openMission()">+</button>`;
  const el=document.getElementById('content');
  if(t==='dash')el.innerHTML=rDash();
  else if(t==='clients')el.innerHTML=rClients();
  else if(t==='missions')el.innerHTML=rMissions();
  else el.innerHTML=rRecap();
}

function rDash(){
  const ca=D.missions.reduce((s,m)=>s+calcTotal(m),0);
  const enc=D.missions.filter(m=>m.etat==='En cours').length;
  const last=[...D.missions].reverse().slice(0,5);
  return`<div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Clients</div><div class="stat-value" style="color:#534AB7">${D.clients.length}</div></div>
    <div class="stat-card"><div class="stat-label">Missions</div><div class="stat-value" style="color:#007AFF">${D.missions.length}</div></div>
    <div class="stat-card"><div class="stat-label">En cours</div><div class="stat-value" style="color:#ff9500">${enc}</div></div>
    <div class="stat-card"><div class="stat-label">CA total</div><div class="stat-value" style="color:#34c759;font-size:20px">${ca.toLocaleString('fr-FR',{maximumFractionDigits:0})} €</div></div>
  </div>
  <div class="section-header" style="margin:20px 12px 0">Dernières missions</div>
  ${last.length===0?`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Aucune mission</div><div class="empty-sub">Appuie sur + pour créer</div></div>`:`
  <div class="section">${last.map(m=>{const cl=D.clients.find(c=>c.id===m.cid);return`
    <div class="cell" onclick="openDetail(${m.id})">
      <div class="cell-icon" style="background:#ede9fe">📋</div>
      <div class="cell-content"><div class="cell-title">${m.chantier||'—'}</div><div class="cell-sub">${cdn(cl)} · ${fd(m.date)}</div></div>
      <div class="cell-right">${eB(m.etat)}<span class="cell-chevron">›</span></div>
    </div>`;}).join('')}</div>`}`;
}

function rClients(){
  if(!D.clients.length)return`<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-text">Aucun client</div><div class="empty-sub">Appuie sur + pour ajouter</div></div>`;
  return`<div class="section" style="margin:16px 12px 0">${D.clients.map(c=>{
    const nb=D.missions.filter(m=>m.cid===c.id).length;
    return`<div class="cell" onclick="openClient(${c.id})">
      <div class="cell-icon" style="background:#ede9fe;font-size:15px;font-weight:700;color:#534AB7">${ini(c)}</div>
      <div class="cell-content"><div class="cell-title">${cdn(c)}</div><div class="cell-sub">${c.type} · ${nb} mission${nb>1?'s':''}</div></div>
      <span class="cell-chevron">›</span>
    </div>`;}).join('')}</div>`;
}

function rMissions(){
  if(!D.missions.length)return`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Aucune mission</div><div class="empty-sub">Appuie sur + pour créer</div></div>`;
  return`<div class="section" style="margin:16px 12px 0">${[...D.missions].reverse().map(m=>{
    const cl=D.clients.find(c=>c.id===m.cid);
    const ns=D.suivis.filter(s=>s.mid===m.id).length;
    return`<div class="cell" onclick="openDetail(${m.id})">
      <div class="cell-icon" style="background:#e8f4fd">📋</div>
      <div class="cell-content"><div class="cell-title">${m.chantier||'—'}</div><div class="cell-sub">${cdn(cl)} · ${fm(calcTotal(m))}</div></div>
      <div class="cell-right">${eB(m.etat)}${ns>0?`<span style="background:#534AB7;color:#fff;font-size:11px;border-radius:10px;padding:1px 6px">${ns}</span>`:''}<span class="cell-chevron">›</span></div>
    </div>`;}).join('')}</div>`;
}

function rRecap(){
  const now=new Date();const months=[];
  for(let i=0;i<6;i++){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push({y:d.getFullYear(),m:d.getMonth()+1,label:d.toLocaleDateString('fr-FR',{month:'long',year:'numeric'})});}
  return`<div style="padding:16px 12px 0">
    <div class="form-section">
      <div class="form-cell"><div class="form-label">Mois</div><select class="form-select" id="sel-m" onchange="upRecap()">${months.map((mo,i)=>`<option value="${i}">${mo.label}</option>`).join('')}</select></div>
      <div class="form-cell"><div class="form-label">Client</div><select class="form-select" id="sel-c" onchange="upRecap()"><option value="">Tous</option>${D.clients.map(c=>`<option value="${c.id}">${cdn(c)}</option>`).join('')}</select></div>
    </div>
  </div>
  <div id="rc" style="padding:0 12px"></div>`;
}

function upRecap(){
  const now=new Date();const months=[];
  for(let i=0;i<6;i++){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push({y:d.getFullYear(),m:d.getMonth()+1});}
  const mi=parseInt(document.getElementById('sel-m').value)||0;
  const sc=document.getElementById('sel-c').value;
  document.getElementById('rc').innerHTML=bRecap(months[mi],sc?parseInt(sc):null);
}

function bRecap(selM,selC){
  let f=D.missions.filter(m=>{if(!m.date)return false;const[y,mo]=m.date.split('-').map(Number);return y===selM.y&&mo===selM.m&&(selC===null||m.cid===selC);});
  const tot=f.reduce((s,m)=>s+calcTotal(m),0);
  if(!f.length)return`<div class="empty-state"><div class="empty-icon">💶</div><div class="empty-text">Aucune mission ce mois-ci</div></div>`;
  const by={};f.forEach(m=>{if(!by[m.cid])by[m.cid]=[];by[m.cid].push(m);});
  let h='';
  Object.keys(by).forEach(cid=>{
    const cl=D.clients.find(c=>c.id===parseInt(cid));
    const ms=by[cid];const sT=ms.reduce((s,m)=>s+calcTotal(m),0);
    h+=`<div class="section-header" style="margin:16px 0 4px">${cdn(cl)} · ${sT.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})} €</div><div class="section">`;
    ms.forEach(m=>{h+=`<div class="cell"><div class="cell-content"><div class="cell-title">${m.chantier||'—'}</div>${m.adresse?`<div class="cell-sub">${m.adresse}</div>`:''}</div><div class="cell-right">${eB(m.etat)}<span style="font-weight:600">${fm(calcTotal(m))}</span></div></div>`;});
    h+=`</div>`;
    h+=`<button class="ios-btn ios-btn-purple" style="margin:8px 0" onclick="openPDFSelector(${cid})">📄 Générer PDF pour ${cdn(cl)}</button>`;
  });
  h+=`<div class="totaux" style="margin-top:12px"><div class="tot-row tot-grand"><span>Total du mois</span><span>${tot.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})} €</span></div></div>`;
  return h;
}

/* ===== PHOTO ZONE - UN SEUL BOUTON ===== */
function photoZone(pid,arr,label){
  return`<div class="pzone">
    <button type="button" class="photo-main-btn" onclick="showPhotoMenu('${pid}')">
      📷 ${label||'Ajouter des photos'}
    </button>
    <input type="file" id="inp-${pid}-cam" accept="image/*" capture="environment" style="display:none" onchange="onPhoto('${pid}',this)">
    <input type="file" id="inp-${pid}-gal" accept="image/*" multiple style="display:none" onchange="onPhoto('${pid}',this)">
    <input type="file" id="inp-${pid}-file" accept="image/*" multiple style="display:none" onchange="onPhoto('${pid}',this)">
    <div class="pprev" id="prev-${pid}">${thumbs(pid,arr)}</div>
  </div>`;
}

function showPhotoMenu(pid){
  const ol=document.createElement('div');ol.className='action-overlay';ol.id='ao-'+pid;
  ol.onclick=()=>{ol.remove();const b=document.getElementById('as-'+pid);if(b)b.remove();};
  document.body.appendChild(ol);
  const as=document.createElement('div');as.className='action-sheet';as.id='as-'+pid;
  as.innerHTML=`<div class="action-group">
    <div class="action-item" onclick="trigP('${pid}','cam');closeAS('${pid}')">📷 Appareil photo</div>
    <div class="action-item" onclick="trigP('${pid}','gal');closeAS('${pid}')">🖼️ Photothèque</div>
    <div class="action-item" onclick="trigP('${pid}','file');closeAS('${pid}')">📁 Fichiers</div>
  </div>
  <div class="action-cancel" onclick="closeAS('${pid}')">Annuler</div>`;
  document.body.appendChild(as);
}
function closeAS(pid){const a=document.getElementById('ao-'+pid);const b=document.getElementById('as-'+pid);if(a)a.remove();if(b)b.remove();}
function trigP(pid,type){document.getElementById(`inp-${pid}-${type}`).click();}
function getPhotos(pid){
  if(pid.startsWith('avant-'))return missionPhotosAvant[pid]||(missionPhotosAvant[pid]=[]);
  if(pid.startsWith('apres-'))return missionPhotosApres[pid]||(missionPhotosApres[pid]=[]);
  return linePhotos[pid]||(linePhotos[pid]=[]);
}
function onPhoto(pid,inp){
  const arr=getPhotos(pid);
  Array.from(inp.files).forEach(f=>{const r=new FileReader();r.onload=e=>{arr.push(e.target.result);upPrev(pid);};r.readAsDataURL(f);});
  inp.value='';
}
function thumbs(pid,arr){return(arr||[]).map((src,i)=>`<div class="pthumb"><img src="${src}" alt="photo"><button class="pdel" onclick="rmP('${pid}',${i})">✕</button></div>`).join('');}
function upPrev(pid){const el=document.getElementById(`prev-${pid}`);if(el)el.innerHTML=thumbs(pid,getPhotos(pid));}
function rmP(pid,i){getPhotos(pid).splice(i,1);upPrev(pid);}

function saveClient(id){

  else{raison=document.getElementById('f-raison').value.trim();if(!raison){alert('Raison sociale obligatoire');return;}}

  if(id){const i=D.clients.findIndex(c=>c.id===id);D.clients[i]=obj;}else D.clients.push(obj);
  save();closeSheet();go('clients');
}
function delClient(id){if(confirm('Supprimer ce client ?')){D.clients=D.clients.filter(c=>c.id!==id);save();closeSheet();go('clients');}}

function onPhotoLigne(lid,inp){
  if(!linePhotos['ligne-'+lid])linePhotos['ligne-'+lid]=[];
  Array.from(inp.files).forEach(f=>{const r=new FileReader();r.onload=e=>{linePhotos['ligne-'+lid].push(e.target.result);renderLignes();};r.readAsDataURL(f);});
  inp.value='';
}
function rmPhotoLigne(lid,i){linePhotos['ligne-'+lid].splice(i,1);renderLignes();}
function updL(id,key,val){const l=lignesTemp.find(x=>x.id===id);if(!l)return;l[key]=val;updateTotals();}
function addLigne(){const l=newLigne();lignesTemp.push(l);renderLignes();}
function delLigne(id){lignesTemp=lignesTemp.filter(l=>l.id!==id);renderLignes();}
function updateTotals(){
  let tp=0,tv=0;
  lignesTemp.forEach(l=>{const t=(parseFloat(l.qte)||0)*(parseFloat(l.prix)||0);if(l.type==='Prestation')tp+=t;else tv+=t;});
  const el=document.getElementById('totaux-display');
  if(el)el.innerHTML=`<div class="tot-row"><span>Total Prestation</span><span>${fmn(tp)} €</span></div><div class="tot-row"><span>Total Vente</span><span>${fmn(tv)} €</span></div><div class="tot-row tot-grand"><span>Total Général</span><span>${fmn(tp+tv)} €</span></div>`;
}

function saveMission(id){
  const cid=parseInt(document.getElementById('f-cid').value);
  const chantier=document.getElementById('f-ch').value.trim();
  if(!cid||!chantier){alert('Client et chantier obligatoires');return;}
  const lignes=lignesTemp.map(l=>({...l,photosLigne:[...(linePhotos["ligne-"+l.id]||[])]}));
  const m=id?D.missions.find(x=>x.id===id):null;
  const obj={
    id:id||D.mid++,cid,
    date:document.getElementById('f-date').value,
    chantier,
    adresse:document.getElementById('f-adr').value.trim(),
    etat:document.getElementById('f-et').value,
    lignes,
    comment:document.getElementById('f-comment').value.trim(),
    photosAvant:[...(missionPhotosAvant['avant-new']||[])],
    photosApres:m?m.photosApres||[]:[],

  };
  if(id){const i=D.missions.findIndex(m=>m.id===id);D.missions[i]=obj;}else D.missions.push(obj);
  missionPhotosAvant={};lignesTemp=[];save();closeSheet();go('missions');
}
function delMission(id){if(confirm('Supprimer ?')){D.missions=D.missions.filter(m=>m.id!==id);D.suivis=D.suivis.filter(s=>s.mid!==id);save();closeSheet();go('missions');}}

      <div class="form-cell"><div class="form-label">Note de suivi</div><textarea class="form-textarea" id="s-note-${id}" placeholder="Retour sur site, remarque..."></textarea></div>
    </div>
    <button class="ios-btn ios-btn-orange" onclick="saveSuivi(${id})">+ Ajouter un suivi</button>
    <button class="ios-btn ios-btn-primary" onclick="closeSheet();openMission(${id})">✏️ Modifier la mission</button>
  `);
}

function setEtat(id,etat){
  const m=D.missions.find(x=>x.id===id);if(!m)return;
  m.etat=etat;save();
  const bar=document.getElementById('status-bar-'+id);
  if(bar){bar.querySelectorAll('.status-btn').forEach(btn=>{
    btn.className='status-btn';
    if(btn.textContent==='En attente'&&etat==='En attente')btn.classList.add('active-wt');
    if(btn.textContent==='En cours'&&etat==='En cours')btn.classList.add('active-go');
    if(btn.textContent==='Terminée'&&etat==='Terminée')btn.classList.add('active-dn');
    if(btn.textContent==='Payée'&&etat==='Payée')btn.classList.add('active-py');
  });}
}

function saveCompteRendu(id){
  const m=D.missions.find(x=>x.id===id);if(!m)return;
  m.dateExec=document.getElementById('cr-date-'+id).value;
  m.compteRendu=document.getElementById('cr-comment-'+id).value.trim();
  m.photosApres=[...(missionPhotosApres['apres-'+id]||[])];
  if(m.etat==='En attente'||m.etat==='En cours')m.etat='Terminée';
  save();alert('✅ Compte rendu enregistré !');closeSheet();go('missions');
}

function saveSuivi(mid){
  const note=document.getElementById('s-note-'+mid).value.trim();
  if(!note){alert('Note obligatoire');return;}
  D.suivis.push({id:D.sid++,mid,date:document.getElementById('s-date-'+mid).value,note});
  save();closeSheet();openDetail(mid);
}
function delSuivi(id,mid){D.suivis=D.suivis.filter(s=>s.id!==id);save();closeSheet();openDetail(mid);}

/* ===== GÉNÉRATION PDF ===== */
function openPDFSelector(cid){
  const cl=D.clients.find(c=>c.id===cid);
  const missions=D.missions.filter(m=>m.cid===cid);
  if(!missions.length){alert('Aucune mission pour ce client.');return;}
  sheet(`PDF — ${cdn(cl)}`,`
    <div style="font-size:14px;color:#8e8e93;margin-bottom:8px">Sélectionne les missions à inclure dans le PDF :</div>
    <div class="form-section">
      ${missions.map(m=>`<div class="mission-check">
        <input type="checkbox" id="chk-${m.id}" value="${m.id}" ${m.etat==='Terminée'||m.etat==='Payée'?'checked':''}>
        <div style="flex:1">
          <div style="font-weight:500">${m.chantier||'—'}</div>
          <div style="font-size:13px;color:#8e8e93">${fd(m.date)} · ${fm(calcTotal(m))} · ${eB(m.etat)}</div>
        </div>
      </div>`).join('')}
    </div>
    <button class="ios-btn ios-btn-purple" onclick="generatePDF(${cid})">📄 Générer le PDF</button>
  `);
}

function generatePDF(cid){
  const cl=D.clients.find(c=>c.id===cid);
  const checked=[...document.querySelectorAll('input[type=checkbox]:checked')].map(cb=>parseInt(cb.value));
  if(!checked.length){alert('Sélectionne au moins une mission.');return;}
  const missions=checked.map(id=>D.missions.find(m=>m.id===id)).filter(Boolean);
  const totalGlobal=missions.reduce((s,m)=>s+calcTotal(m),0);
  const date=new Date().toLocaleDateString('fr-FR');

  let missionsHTML='';
  missions.forEach(m=>{
    const lignes=m.lignes||[];
    const tp=calcTP(m),tv=calcTV(m),tot=calcTotal(m);
    let lignesRows=lignes.map(l=>`<tr>
      <td>${l.type}</td>
      <td>${l.designation||'—'}</td>
      <td style="text-align:center">${l.qte}</td>
      <td style="text-align:right">${l.prix?parseFloat(l.prix).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €':'—'}</td>
      <td style="text-align:right;font-weight:600">${fmn((parseFloat(l.qte)||0)*(parseFloat(l.prix)||0))} €</td>
    </tr>`).join('');

    let photosAvantHTML='';
    const pav=m.photosAvant||[];
    if(pav.length>0){
      photosAvantHTML=`<div class="photos-section"><div class="photos-label">Photos avant (${pav.length})</div><div class="photos-grid">${pav.map(src=>`<img src="${src}" onerror="this.style.display='none'">`).join('')}</div></div>`;
    }
    let photosApresHTML='';
    const pap=m.photosApres||[];
    if(pap.length>0){
      photosApresHTML=`<div class="photos-section"><div class="photos-label">Photos après (${pap.length})</div><div class="photos-grid">${pap.map(src=>`<img src="${src}" onerror="this.style.display='none'">`).join('')}</div></div>`;
    }
    // Photos par ligne de travaux
    let photosLignesHTML='';
    const lignesAvecPhotos=(m.lignes||[]).filter(l=>(l.photosLigne||[]).length>0);
    if(lignesAvecPhotos.length>0){
      photosLignesHTML=`<div class="photos-section"><div class="photos-label">Photos des travaux</div><div class="photos-grid">${lignesAvecPhotos.map(l=>(l.photosLigne||[]).map(src=>`<img src="${src}" onerror="this.style.display='none'">`).join('')).join('')}</div></div>`;
    }

    missionsHTML+=`<div class="mission">
      <div class="mission-header">
        <span>Mission #${m.id} — ${m.chantier||'—'}</span>
        <span class="mission-badge">${m.etat||'—'}</span>
      </div>
      <div class="mission-info">
        <div class="info-cell"><div class="info-label">Date</div><div class="info-value">${fd(m.date)}</div></div>
        <div class="info-cell"><div class="info-label">Adresse</div><div class="info-value">${m.adresse||'—'}</div></div>
        ${m.dateExec?`<div class="info-cell"><div class="info-label">Date d'exécution</div><div class="info-value">${fd(m.dateExec)}</div></div><div class="info-cell"></div>`:''}
      </div>
      ${lignes.length>0?`<table>
        <thead><tr><th>Type</th><th>Désignation</th><th>Qté</th><th>Prix</th><th>Total</th></tr></thead>
        <tbody>${lignesRows}</tbody>
      </table>
      <div class="mission-totaux">
        <div class="total-line"><span>Total Prestation</span><span>${fmn(tp)} €</span></div>
        <div class="total-line"><span>Total Vente</span><span>${fmn(tv)} €</span></div>
        <div class="total-grand"><span>Total mission</span><span>${fmn(tot)} €</span></div>
      </div>`:''}
      ${m.compteRendu?`<div class="compte-rendu"><div class="cr-label">Compte rendu</div>${m.compteRendu}</div>`:''}
      ${photosAvantHTML}${photosApresHTML}${photosLignesHTML}
    </div>`;
  });

  const html=`
    <div class="pdf-wrap">
      <div class="header">
        <div>
          <div class="company-name">${MSH.name}</div>
          <div class="company-info">
            ${MSH.contact} — ${MSH.activite}<br>
            <span style="color:#fff!important">📞 ${MSH.tel}</span> &nbsp;·&nbsp; <span style="color:#fff!important">✉️ ${MSH.mail}</span><br>
            📍 ${MSH.adresse}, ${MSH.cp} ${MSH.ville}
          </div>
        </div>
        <div class="doc-info">
          <div class="doc-title">Récapitulatif</div>
          <div class="doc-sub">Date : ${date}<br>${missions.length} mission${missions.length>1?'s':''}</div>
        </div>
      </div>
      <div class="client-box">
        <div class="client-label">Client</div>
        <div class="client-name">${cdn(cl)}</div>
        ${cl.mobile||cl.mail?`<div class="client-sub">${cl.mobile?'📞 '+cl.mobile:''}${cl.mobile&&cl.mail?' &nbsp;·&nbsp; ':''} ${cl.mail?'✉️ '+cl.mail:''}</div>`:''}
      </div>
      ${missionsHTML}
      <div class="grand-total">
        <div><div class="gt-label">Total général</div></div>
        <div class="gt-amount">${totalGlobal.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})} €</div>
      </div>
      <div class="footer">${MSH.name} — ${MSH.adresse}, ${MSH.cp} ${MSH.ville} — ${MSH.tel} — ${MSH.mail}</div>
    </div>
  `;

  // Collecter toutes les photos pour les passer dans la nouvelle fenêtre
  // Les images sont déjà dans le html via les src base64, on ouvre directement
  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Récapitulatif ${cdn(cl)}</title>
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:-apple-system,Arial,sans-serif;font-size:13px;color:#1c1c1e;background:#f5f5f5;padding:16px}
      .share-btn{display:block;width:100%;padding:14px;background:#007AFF;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;margin-bottom:16px;cursor:pointer;font-family:inherit}
      .pdf-wrap{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08)}
      .header{background:#1a3a6b;padding:20px;display:flex;justify-content:space-between;align-items:flex-start}
      .company-name{font-size:18px;font-weight:700;color:#fff;margin-bottom:4px}
      .company-info{font-size:11px;color:rgba(255,255,255,.8);line-height:1.7} .company-info a{color:#fff!important;text-decoration:none}
      .doc-info{text-align:right;color:rgba(255,255,255,.9)}
      .doc-title{font-size:14px;font-weight:700;margin-bottom:4px}
      .doc-sub{font-size:11px;color:rgba(255,255,255,.7);line-height:1.6}
      .client-box{margin:16px;background:#f5f7ff;border-left:3px solid #1a3a6b;padding:10px 14px;border-radius:0 8px 8px 0}
      .client-label{font-size:10px;color:#888;text-transform:uppercase;font-weight:700;letter-spacing:.5px;margin-bottom:5px}
      .client-name{font-size:15px;font-weight:700;color:#1a3a6b;margin-bottom:3px}
      .client-sub{font-size:12px;color:#555}
      .mission{margin:0 16px 14px;border:1px solid #e5e5e5;border-radius:10px;overflow:hidden}
      .mission-header{background:#1a3a6b;color:#fff;padding:10px 14px;font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
      .mission-badge{background:rgba(255,255,255,.2);padding:2px 8px;border-radius:10px;font-size:11px}
      .mission-info{display:grid;grid-template-columns:1fr 1fr;gap:0;border-bottom:1px solid #f0f0f0}
      .info-cell{padding:8px 14px;border-right:1px solid #f0f0f0}
      .info-cell:nth-child(even){border-right:none}
      .info-label{font-size:10px;color:#888;text-transform:uppercase;font-weight:600;margin-bottom:2px;letter-spacing:.4px}
      .info-value{font-size:13px;font-weight:500;color:#1c1c1e}
      table{width:100%;border-collapse:collapse;font-size:12px}
      th{background:#f8f9ff;color:#1a3a6b;padding:8px 14px;text-align:left;font-size:11px;font-weight:700;border-bottom:1px solid #e5e5e5;text-transform:uppercase;letter-spacing:.4px}
      th:last-child{text-align:right}
      td{padding:8px 14px;border-bottom:1px solid #f5f5f5;color:#1c1c1e}
      td:last-child{text-align:right;font-weight:600;color:#065f46}
      tr:last-child td{border-bottom:none}
      .mission-totaux{padding:10px 14px;background:#fafafa;border-top:1px solid #f0f0f0}
      .total-line{display:flex;justify-content:space-between;font-size:12px;color:#555;padding:2px 0}
      .total-grand{display:flex;justify-content:space-between;font-size:14px;font-weight:700;color:#1a3a6b;border-top:1px solid #ddd;padding-top:8px;margin-top:6px}
      .compte-rendu{padding:10px 14px;font-size:12px;color:#555;border-top:1px solid #f0f0f0;background:#fffdf0}
      .cr-label{font-size:10px;color:#888;text-transform:uppercase;font-weight:700;margin-bottom:4px}
      .photos-section{padding:10px 14px;border-top:1px solid #f0f0f0}
      .photos-label{font-size:10px;color:#888;text-transform:uppercase;font-weight:700;letter-spacing:.4px;margin-bottom:8px}
      .photos-grid{display:flex;flex-wrap:wrap;gap:6px}
      .photos-grid img{width:130px;height:100px;object-fit:cover;border-radius:6px;border:1px solid #e5e5e5;display:block}
      .grand-total{margin:16px;background:#1a3a6b;color:#fff;padding:14px 16px;border-radius:10px;display:flex;justify-content:space-between;align-items:center}
      .gt-label{font-size:12px;opacity:.8;margin-bottom:2px}
      .gt-amount{font-size:20px;font-weight:700}
      .footer{padding:14px 16px;text-align:center;font-size:11px;color:#888;border-top:1px solid #f0f0f0}
      @media print{.share-btn{display:none}.pdf-wrap{box-shadow:none}}
    </style>
  </head><body>
    <button class="share-btn" onclick="window.print()">🖨️ Imprimer / Enregistrer en PDF</button>
    ${html}
  </body></html>`);
  win.document.close();
}

function sheet(title,body){
  const ov=document.createElement('div');ov.className='sheet-overlay';ov.id='sheet-overlay';
  ov.onclick=e=>{if(e.target===ov)closeSheet();};
  ov.innerHTML=`<div class="sheet"><div class="sheet-handle"></div>
    <div class="sheet-header"><div class="sheet-title">${title}</div><button onclick="closeSheet()" style="border:none;background:none;color:#007AFF;font-size:16px;cursor:pointer;font-family:inherit">Fermer</button></div>
    <div class="sheet-body">${body}</div></div>`;
  document.body.appendChild(ov);
}
function closeSheet(){const s=document.getElementById('sheet-overlay');if(s)s.remove();}

initData().then(function(){go('dash');});
